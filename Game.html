<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A B.ARENA</title>
    <link rel="stylesheet" href="Game.css">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png" >
        
    
</head>
<body>
    <div class="menu">
    <h1 class="title">ARCADE B.ARENA</h1>

    <button class="menu-btn" id="startButton">START GAME</button>
    <button class="menu-btn" id="highScoresButton">HIGH SCORES</button>
    <button class="menu-btn" id="optionsButton">OPTIONS</button>
    </div>

    <div class="options" id="optionsMenu" style="display:none;">
    
    <h2 class="op">OPTIONS</h2>

    <button id="soundToggle" class="ss">Sound: ON</button>

    <label class="bb">Ball Color</label>
    <input type="color" id="ballColor" value="#ffffff" class="cc">

    <br><br>
    <button id="backBtn" class="bc">BACK</button>

    </div>

    <div class="high-scores" id="highScoresMenu" style="display:none;">
        <h2 class="hs">HIGH SCORES</h2>
        <ul id="highScoresList" class="hs-list"></ul>
        <button id="backBtn2" class="bc">BACK</button>
    </div>

    <canvas id="myCanvas" width="1527" height="730" ></canvas>
    <script src="Game.js"></script>
</body>
</html>
